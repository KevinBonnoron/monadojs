commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bunx biome check --write --unsafe --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  piped: true
  commands:
    test-and-build:
      run: bun run test && bun run build
    jsr-dry-run:
      run: bunx jsr publish --dry-run
